  function Employee(data)
  {
      this.surname = data.surname;
      this.name = data.name;
      this.patronymic = data.patronymic;
      this.birthday  = data.birthday;
      this.experience = data.expirience;
      this.salary = data.salary;
      this.salary13 = data.salary13;
      this.gender = data.gender;
      this.vacation = data.vacation;
  }                  

  Employee.prototype.calculateNetSalary = function()
  {
      return +(this.salary * 1.15*0.87).toFixed(2);
  }

  Employee.prototype.calculateNetSalary13 = function()
  {
      return +(this.salary13 * 1.15*0.87).toFixed(2);
  }

  Employee.prototype.calculateYearSalary = function()
  {
      return Math.round(this.calculateNetSalary() * 12);
  }

  Employee.prototype.calculateTaxReturn = function()
  {
      const yearSalary = this.calculateYearSalary();
      return Math.round(yearSalary * 0.13);
  }

  Employee.prototype.calculateNewSalary = function()
  {
      return +(this.salary * 1.078).toFixed(2);
  }
  Employee.prototype.calculateAge = function()
  {
      const today  = new Date();
      const birthday = new Date(this.birthday);
      let year = today.getFullYear() - birthday.getFullYear();
      let month = today.getMonth() - birthday.getMonth();

      if (month < 0)
      {
          month+=12;
          year-=1;
      }
      return [year, month];
  }

  Employee.prototype.remainsToPension = function()
  {
      const [year, month] = this.calculateAge();
      const months = this.gender ==="m" ? 64*12: 59*12;
      const remainsMonth = months - year*12+month;
      if (remainsMonth < 0)
      {
          return [null, null];
      }
      if (remainsMonth % 12 == 0)
      {
          return [remainsMonth/12, 0];
      }
      return [Math.floor(remainsMonth/12), 12 - remainsMonth% 12];
  }

  Employee.prototype.formatBirthday = function(months)
  {
      const tempdate = new Date(this.birthday);
      return `${tempdate.getDate()}.${months[tempdate.getMonth()][1]}.${tempdate.getUTCFullYear()}`;
  }
  Employee.prototype.getAgeString = function()
  {
      const [ageYear] = this.calculateAge();
      if(ageYear % 10 === 1 && ageYear%100 !=11)
      {
          return ageYear + " год";
      }
      else if((ageYear % 10 === 2 || ageYear % 10 === 3 || ageYear % 10 === 4) && ageYear%100 != 12 && ageYear%100 != 13 && ageYear % 100 !=14) 
      {
          return ageYear + " года";
      }
      else
      {
          return ageYear + " лет";
      }
  }

  Employee.prototype.getPersonString = function()
  {
      const [rtrYear, rtpMonth] = this.remainsToPension();
      if (rtrYear===null)
      {
          return "чувак уже кайфует на пенсии пепе";
      }

      if (rtrYear === 0)
      {
          return `${rtpMonth} месяцев`;
      }

      let yearStr;

      if(rtrYear % 10 === 1 && rtrYear%100 !=11)
      {
          yearStr = rtrYear + " год";
      }
      else if((rtrYear % 10 === 2 || rtrYear % 10 === 3 || rtrYear % 10 === 4) && rtrYear%100 != 12 && rtrYear%100 != 13 && rtrYear % 100 !=14) 
      {
          yearStr = rtrYear + " года";
      }
      else
      {
          yearStr = rtrYear + " лет"
      }

      if (rtpMonth == 0)
      {
          return yearStr;
      }
      return `${yearStr} ${rtpMonth} месяцев`;



  }
